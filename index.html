<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AINCRAD — 100 Floors</title>
    <link rel="stylesheet" href="styles/style.css">
    <!-- Three.js from CDN -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <!-- Game Canvas Container -->
    <div id="game-container"></div>
    
    <!-- UI Overlays -->
    <div id="ui-layer">
        <div id="hud">
            <div id="health-bar-container"><div id="health-bar"></div></div>
            <div id="xp-bar-container"><div id="xp-bar"></div></div>
            <div id="stats-display">Lv <span id="level">1</span> HP <span id="hp">100</span>/<span id="max-hp">100</span></div>
        </div>
        
        <!-- Mobile Controls -->
        <div id="virtual-joystick" class="mobile-only"></div>
        <div id="mobile-attack-btn" class="mobile-only">ATTACK</div>

        <!-- Main Menu / Login -->
        <div id="login-screen">
            <h1>AINCRAD — 100 Floors</h1>
            <p>100 floors. Har floor par ek Town (safe) aur ek Field (monsters).</p>
            <div id="google-signin-container"></div>
            <button id="guest-btn">ENTER AS GUEST</button>
            <div id="guest-warning">⚠ Guest mode: Progress won't save permanently.</div>
        </div>

        <!-- In-Game HUD Buttons -->
        <div id="hud-buttons" style="display:none;">
            <button id="btn-inventory">🎒 Inv</button>
            <button id="btn-skills">🌀 Skill</button>
            <button id="btn-map">🗺️ Map</button>
            <button id="btn-team">👥 Team</button>
            <button id="btn-hub">🌐 Hub</button>
            <button id="btn-interact">[E] Interact</button>
        </div>

        <!-- Modals -->
        <div id="modal-overlay" class="hidden">
            <div id="skill-tree-modal" class="modal hidden">
                <h2>SKILL TREE</h2>
                <div id="skill-list"></div>
                <button class="close-modal">✕</button>
            </div>
            <div id="inventory-modal" class="modal hidden">
                <h2>INVENTORY & GEAR</h2>
                <div id="inventory-list"></div>
                <button class="close-modal">✕</button>
            </div>
            <div id="map-modal" class="modal hidden">
                <h2>FLOOR MAP</h2>
                <div id="floor-list"></div>
                <button class="close-modal">✕</button>
            </div>
            <div id="team-modal" class="modal hidden">
                <h2>TEAM & VOICE</h2>
                <div id="team-info"></div>
                <button id="toggle-mic">🎤 Mic off</button>
                <button class="close-modal">✕</button>
            </div>
            <div id="hub-modal" class="modal hidden">
                <h2>TOWN HUB</h2>
                <div id="hub-chat"></div>
                <button class="close-modal">✕</button>
            </div>
        </div>
    </div>

    <!-- Main Entry Point -->
    <script type="module" src="src/game.js"></script>
</body>
</html>
